name: Bot Football Automatique

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0,30 11-21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: morning ou live'
        required: true
        default: 'morning'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Déterminer le mode
        id: mode
        run: |
          HOUR=$(date -u +"%H")
          MINUTE=$(date -u +"%M")
          if [ "$HOUR" = "07" ] && [ "$MINUTE" = "00" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=live" >> $GITHUB_OUTPUT
          fi

      - name: Lancer le bot
        run: python bot_football.py ${{ steps.mode.outputs.mode }}
